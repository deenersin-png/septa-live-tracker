<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEPTA Spreadsheet Validation Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>SEPTA Spreadsheet Validation Engine</h1>
        <div class="controls">
            <button id="refreshBtn">Sync & Validate Spreadsheet Rows</button>
        </div>
        <p id="statusText">Ready to parse your Google Sheet data...</p>
    </header>

    <main>
        <table id="busTable">
            <thead>
                <tr>
                    <th>Route</th>
                    <th>Bus ID</th>
                    <th>Trip Number</th>
                    <th>Leader Bus</th>
                    <th>Follower Bus</th>
                    <th>Validation Status</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Rows load here -->
            </tbody>
        </table>
    </main>

    <script>
        // ⚠️ PASTE YOUR COPIED PUBLIC CSV LINK BETWEEN THE QUOTATION MARKS:
        const CSV_URL = "https://google.com";

        document.getElementById('refreshBtn').addEventListener('click', parseSpreadsheetData);

        // Robust CSV row processing engine
        function parseCSVLine(line) {
            let result = [];
            let current = '';
            let inQuotes = false;

            for (let i = 0; i < line.length; i++) {
                let char = line[i];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            return result;
        }

        async function parseSpreadsheetData() {
            const statusText = document.getElementById('statusText');
            const tableBody = document.getElementById('tableBody');
            
            statusText.innerText = "Connecting to Google Spreadsheet...";
            tableBody.innerHTML = ""; 

            try {
                // Fetch directly or fall back through a proxy if browser restricts local testing
                let response = await fetch(CSV_URL);
                if (!response.ok) {
                    const fallbackProxy = `https://allorigins.win{encodeURIComponent(CSV_URL)}`;
                    const proxyResponse = await fetch(fallbackProxy);
                    const proxyData = await proxyResponse.json();
                    if(!proxyResponse.ok) throw new Error("Google Sheets access denied.");
                    var csvText = proxyData.contents;
                } else {
                    var csvText = await response.text();
                }
                
                const lines = csvText.split(/\r?\n/).filter(line => line.trim() !== "");
                let busTrips = [];

                // Process lines, skipping the header row
                for (let i = 1; i < lines.length; i++) {
                    const columns = parseCSVLine(lines[i]);
                    if (columns.length < 5) continue; 

                    busTrips.push({
                        route: columns[0] || "Unknown Route",
                        busId: columns[1] || "",
                        tripNumber: columns[2] || "",
                        leaderBus: columns[3] || "",
                        followerBus: columns[4] || ""
                    });
                }

                if (busTrips.length === 0) {
                    statusText.innerText = "❌ Table content layout is empty or mismatched.";
                    return;
                }

                // Sequence matching validation loop
                busTrips.forEach((currentBus) => {
                    let isMismatch = false;
                    let failureReason = "Validated ✔";

                    const currentBusId = currentBus.busId;
                    const leaderRef = currentBus.leaderBus;
                    const followerRef = currentBus.followerBus;

                    // 1. Leader-to-Follower verification check
                    if (leaderRef && leaderRef.toLowerCase() !== "none" && leaderRef !== "") {
                        const leaderRow = busTrips.find(b => b.busId === leaderRef);
                        if (leaderRow && leaderRow.followerBus !== currentBusId) {
                            isMismatch = true;
                            failureReason = `Leader Mismatch: ${leaderRef} tracks ${leaderRow.followerBus || 'None'}`;
                        } else if (!leaderRow) {
                            isMismatch = true;
                            failureReason = `Missing Leader Row (${leaderRef})`;
                        }
                    }

                    // 2. Follower-to-Leader verification check
                    if (followerRef && followerRef.toLowerCase() !== "none" && followerRef !== "" && !isMismatch) {
                        const followerRow = busTrips.find(b => b.busId === followerRef);
                        if (followerRow && followerRow.leaderBus !== currentBusId) {
                            isMismatch = true;
                            failureReason = `Follower Mismatch: ${followerRef} tracks ${followerRow.leaderBus || 'None'}`;
                        } else if (!followerRow) {
                            isMismatch = true;
                            failureReason = `Missing Follower Row (${followerRef})`;
                        }
                    }

                    const row = document.createElement('tr');
                    if (isMismatch) row.classList.add('mismatch-row');

                    row.innerHTML = `
                        <td>${currentBus.route}</td>
                        <td><strong>${currentBus.busId}</strong></td>
                        <td>${currentBus.tripNumber}</td>
                        <td>${currentBus.leaderBus || 'None'}</td>
                        <td>${currentBus.followerBus || 'None'}</td>
                        <td><span class="badge ${isMismatch ? 'badge-fail' : 'badge-pass'}">${failureReason}</span></td>
                    `;
                    tableBody.appendChild(row);
                });

                statusText.innerHTML = `🟢 <strong>Live Sync Successful!</strong> Processed <strong>${busTrips.length} rows</strong> directly from your spreadsheet mapping structure.`;

            } catch (error) {
                statusText.innerHTML = `❌ <strong>Fetch Failure:</strong> Check that your Google Sheet link is shared as "Anyone with link" and Published as CSV.`;
                console.error(error);
            }
        }

        parseSpreadsheetData();
    </script>
</body>
</html>
