<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEPTA Spreadsheet Validation Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>SEPTA Spreadsheet Validation Engine</h1>
        <div class="controls">
            <button id="refreshBtn">Sync & Validate Spreadsheet Rows</button>
        </div>
        <p id="statusText">Ready to parse your Google Sheet data...</p>
    </header>

    <main>
        <table id="busTable">
            <thead>
                <tr>
                    <th>Route</th>
                    <th>Bus ID</th>
                    <th>Trip Number</th>
                    <th>Leader Bus</th>
                    <th>Follower Bus</th>
                    <th>Validation Status</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Data will populate dynamically -->
            </tbody>
        </table>
    </main>

    <script>
        // ⚠️ REPLACE THIS EXACT STRING WITH YOUR ACTUAL GOOGLE SHEETS CSV EXPORT URL 
        const CSV_URL = "https://google.com";

        document.getElementById('refreshBtn').addEventListener('click', parseSpreadsheetData);

        // Advanced CSV line-splitter that safely handles quotes containing inner commas
        function splitCsvLine(text) {
            let matches = text.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
            if (!matches) {
                return text.split(',').map(val => val.trim());
            }
            return matches.map(val => val.replace(/^"|"$/g, '').trim());
        }

        async function parseSpreadsheetData() {
            const statusText = document.getElementById('statusText');
            const tableBody = document.getElementById('tableBody');
            
            if (CSV_URL.includes("YOUR_PUBLISHED_CSV_URL_HERE") || CSV_URL === "") {
                statusText.innerHTML = "❌ <strong>Configuration Error:</strong> You must paste your real Published CSV URL inside the <code>CSV_URL</code> variable on line 26 of your index.html code.";
                return;
            }

            statusText.innerText = "Attempting secure pipeline connection to Google Sheets...";
            tableBody.innerHTML = ""; 

            try {
                const response = await fetch(CSV_URL);
                if (!response.ok) throw new Error(`HTTP network response failure: Status ${response.status}`);
                
                const csvText = await response.text();
                
                // Split document into lines and filter empty rows
                const lines = csvText.split(/\r?\n/).filter(line => line.trim() !== "");
                
                if (lines.length <= 1) {
                    statusText.innerText = "⚠️ Connected successfully, but your spreadsheet appears to contain empty rows.";
                    return;
                }

                let busTrips = [];

                // Skip header line (index 0) and parse out data
                for (let i = 1; i < lines.length; i++) {
                    const columns = splitCsvLine(lines[i]);
                    
                    // Match minimum expected column fields layout (Route, Bus, Trip, Leader, Follower)
                    if (columns.length < 5) continue; 

                    busTrips.push({
                        route: columns[0] || "Unknown Route",
                        busId: columns[1] || "",
                        tripNumber: columns[2] || "",
                        leaderBus: columns[3] || "",
                        followerBus: columns[4] || ""
                    });
                }

                if (busTrips.length === 0) {
                    statusText.innerText = "❌ Parser Error: Row column layouts do not match expected standard structural settings.";
                    return;
                }

                // Execute Validation Rules Mapping Array
                busTrips.forEach((currentBus) => {
                    let isMismatch = false;
                    let failureReason = "Validated ✔";

                    const cleanBusId = currentBus.busId.trim();
                    const cleanLeader = currentBus.leaderBus.trim();
                    const cleanFollower = currentBus.followerBus.trim();

                    // 1. Leader Contradiction Check
                    if (cleanLeader !== "" && cleanLeader.toLowerCase() !== "none") {
                        const targetLeader = busTrips.find(b => b.busId.trim() === cleanLeader);
                        if (targetLeader && targetLeader.followerBus.trim() !== cleanBusId) {
                            isMismatch = true;
                            failureReason = `Leader ${cleanLeader} states follower is ${targetLeader.followerBus || 'None'}`;
                        } else if (!targetLeader) {
                            isMismatch = true;
                            failureReason = `Orphaned Leader (${cleanLeader} not found active)`;
                        }
                    }

                    // 2. Follower Contradiction Check
                    if (cleanFollower !== "" && cleanFollower.toLowerCase() !== "none" && !isMismatch) {
                        const targetFollower = busTrips.find(b => b.busId.trim() === cleanFollower);
                        if (targetFollower && targetFollower.leaderBus.trim() !== cleanBusId) {
                            isMismatch = true;
                            failureReason = `Follower ${cleanFollower} states leader is ${targetFollower.leaderBus || 'None'}`;
                        } else if (!targetFollower) {
                            isMismatch = true;
                            failureReason = `Orphaned Follower (${cleanFollower} not found active)`;
                        }
                    }

                    // Build table row visibility elements
                    const row = document.createElement('tr');
                    if (isMismatch) {
                        row.classList.add('mismatch-row');
                    }

                    row.innerHTML = `
                        <td>${currentBus.route}</td>
                        <td><strong>${currentBus.busId}</strong></td>
                        <td>${currentBus.tripNumber}</td>
                        <td>${currentBus.leaderBus || 'None'}</td>
                        <td>${currentBus.followerBus || 'None'}</td>
                        <td><span class="badge ${isMismatch ? 'badge-fail' : 'badge-pass'}">${failureReason}</span></td>
                    `;
                    tableBody.appendChild(row);
                });

                statusText.innerHTML = `🟢 <strong>Live Sync Successful!</strong> Scanned and rendered <strong>${busTrips.length} rows</strong> directly from your spreadsheet mapping structure.`;

            } catch (error) {
                statusText.innerHTML = `❌ <strong>Execution Blocked:</strong> ${error.message}. Ensure your Google Sheet is fully published to the web as a public CSV file format.`;
                console.error("Tracking Engine Error Info:", error);
            }
        }

        // Initialize execution immediately upon landing layout build
        parseSpreadsheetData();
    </script>
</body>
</html>
