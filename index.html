<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEPTA Spreadsheet Validation Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>SEPTA Spreadsheet Validation Engine</h1>
        <div class="controls">
            <button id="refreshBtn">Sync & Validate Spreadsheet Rows</button>
        </div>
        <p id="statusText">Ready to parse your Google Sheet data...</p>
    </header>

    <main>
        <table id="busTable">
            <thead>
                <tr>
                    <th>Route</th>
                    <th>Bus ID</th>
                    <th>Trip Number</th>
                    <th>Leader Bus</th>
                    <th>Follower Bus</th>
                    <th>Validation Status</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Rows load here -->
            </tbody>
        </table>
    </main>

    <script>
        // ⚠️ THE LIVE PUBLIC LINK GENERATED FROM YOUR SHEET:
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQEDh9CFyVwuKqWJAGyAspd3ykNKfCN2S7UXPhUlqA9ABOV4xS2aGYKlQjJ264iLvxbbzbR39Lh5zTR/pub?gid=532219678&single=true&output=csv";

        document.getElementById('refreshBtn').addEventListener('click', parseSpreadsheetData);

        // Process complex spreadsheet lines containing double quotes and comma gaps smoothly
        function parseCSVLine(line) {
            let result = [];
            let current = '';
            let inQuotes = false;

            for (let i = 0; i < line.length; i++) {
                let char = line[i];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            return result;
        }

        async function parseSpreadsheetData() {
            const statusText = document.getElementById('statusText');
            const tableBody = document.getElementById('tableBody');
            
            statusText.innerText = "Connecting to Google Spreadsheet pipeline...";
            tableBody.innerHTML = ""; 

            try {
                // Pipe download request through AllOrigins to prevent security freeze errors
                const proxyUrl = `https://allorigins.win{encodeURIComponent(CSV_URL)}&timestamp=${new Date().getTime()}`;
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error("Google Sheets server connection rejected.");
                
                const proxyData = await response.json();
                const csvText = proxyData.contents;
                
                const lines = csvText.split(/\r?\n/).filter(line => line.trim() !== "");
                let busTrips = [];

                // Read header headers row first to verify index locations safely
                const headers = parseCSVLine(lines[0]).map(h => h.toLowerCase().replace(/["\s_]/g, ''));
                
                // Track dynamic index references based on your specific Sheet screenshot names
                const routeIdx = headers.indexOf("route") !== -1 ? headers.indexOf("route") : 0;
                const busIdx = headers.indexOf("bus") !== -1 ? headers.indexOf("bus") : 1;
                const tripIdx = headers.indexOf("tripnumber") !== -1 ? headers.indexOf("tripnumber") : 2;
                const leaderIdx = headers.indexOf("leaderbus") !== -1 ? headers.indexOf("leaderbus") : 3;
                const followerIdx = headers.indexOf("followerbus") !== -1 ? headers.indexOf("followerbus") : 4;

                // Process lines, skipping the header row
                for (let i = 1; i < lines.length; i++) {
                    const columns = parseCSVLine(lines[i]);
                    if (columns.length < 3 || columns[busIdx] === "") continue; 

                    busTrips.push({
                        route: columns[routeIdx] || "ROUTE 21-42 Eastbound",
                        busId: columns[busIdx] || "",
                        tripNumber: columns[tripIdx] || i,
                        leaderBus: columns[leaderIdx] || "",
                        followerBus: columns[followerIdx] || ""
                    });
                }

                if (busTrips.length === 0) {
                    statusText.innerText = "❌ Parse Mismatch: The data rows were empty or headers failed to align.";
                    return;
                }

                // Core logic checks
                busTrips.forEach((currentBus) => {
                    let isMismatch = false;
                    let failureReason = "Validated ✔";

                    const currentBusId = currentBus.busId.trim();
                    const leaderRef = currentBus.leaderBus.trim();
                    const followerRef = currentBus.followerBus.trim();

                    // 1. Leader-to-Follower mismatch validation rule
                    if (leaderRef && leaderRef.toLowerCase() !== "none" && leaderRef !== "") {
                        const leaderRow = busTrips.find(b => b.busId.trim() === leaderRef);
                        if (leaderRow && leaderRow.followerBus.trim() !== currentBusId) {
                            isMismatch = true;
                            failureReason = `Leader error: ${leaderRef} has follower ${leaderRow.followerBus || 'None'}`;
                        }
                    }

                    // 2. Follower-to-Leader mismatch validation rule
                    if (followerRef && followerRef.toLowerCase() !== "none" && followerRef !== "" && !isMismatch) {
                        const followerRow = busTrips.find(b => b.busId.trim() === followerRef);
                        if (followerRow && followerRow.leaderBus.trim() !== currentBusId) {
                            isMismatch = true;
                            failureReason = `Follower error: ${followerRef} has leader ${followerRow.leaderBus || 'None'}`;
                        }
                    }

                    const row = document.createElement('tr');
                    if (isMismatch) row.classList.add('mismatch-row');

                    row.innerHTML = `
                        <td>${currentBus.route}</td>
                        <td><strong>${currentBus.busId}</strong></td>
                        <td>${currentBus.tripNumber}</td>
                        <td>${currentBus.leaderBus || 'None'}</td>
                        <td>${currentBus.followerBus || 'None'}</td>
                        <td><span class="badge ${isMismatch ? 'badge-fail' : 'badge-pass'}">${failureReason}</span></td>
                    `;
                    tableBody.appendChild(row);
                });

                statusText.innerHTML = `🟢 <strong>Live Sync Successful!</strong> Tracked and checked <strong>${busTrips.length} rows</strong> directly from your sheet.`;

            } catch (error) {
                statusText.innerHTML = `❌ <strong>Execution Failure:</strong> ${error.message}. Open your browser inspector panel (F12) to trace execution.`;
                console.error(error);
            }
        }

        parseSpreadsheetData();
    </script>
</body>
</html>
