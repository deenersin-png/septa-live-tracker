<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEPTA Live Bus Mismatch Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>SEPTA Sequence Validation Engine</h1>
        <div class="controls">
            <label for="routeSelect">Route: </label>
            <input type="text" id="routeSelect" value="21" placeholder="e.g., 21">
            <button id="refreshBtn">Fetch & Validate Live Feed</button>
        </div>
        <p id="statusText">Ready to fetch live transit metrics...</p>
    </header>

    <main>
        <table id="busTable">
            <thead>
                <tr>
                    <th>Route</th>
                    <th>Bus ID</th>
                    <th>Trip Number</th>
                    <th>Leader Bus</th>
                    <th>Follower Bus</th>
                    <th>Validation Status</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Live data items are inserted here -->
            </tbody>
        </table>
    </main>

    <script>
        document.getElementById('refreshBtn').addEventListener('click', fetchSeptaData);

        async function fetchSeptaData() {
            const route = document.getElementById('routeSelect').value.trim();
            const statusText = document.getElementById('statusText');
            const tableBody = document.getElementById('tableBody');
            
            statusText.innerText = "Querying live SEPTA streams...";
            tableBody.innerHTML = ""; 

            // Use an alternative robust proxy to avoid strict CORS errors
            const apiEndpoint = `https://septa.org{route}`;
            const proxyUrl = `https://allorigins.win{encodeURIComponent(apiEndpoint)}`;

            try {
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error("Proxy connection issue.");
                
                const wrapperData = await response.json();
                // AllOrigins wraps the actual payload inside a string text property called "contents"
                const data = JSON.parse(wrapperData.contents);
                
                let rawBuses = [];
                let usingMockData = false;

                // Safely handle historical vs current SEPTA object formats
                if (data && data.bus && Array.isArray(data.bus)) {
                    rawBuses = data.bus;
                } else if (Array.isArray(data)) {
                    rawBuses = data;
                }

                // FALLBACK MOCK DATA: If it's off-hours or the API returns nothing, 
                // load your exact matching/mismatching configuration to guarantee the visual works
                if (rawBuses.length === 0) {
                    usingMockData = true;
                    rawBuses = [
                        { VehicleID: "9101", label: "1" },
                        { VehicleID: "9102", label: "2" },
                        { VehicleID: "9103", label: "3" },
                        { VehicleID: "9104", label: "4" }
                    ];
                }

                // Transform raw data array into your leader/follower model
                let busTrips = rawBuses.map((b, index, arr) => {
                    let busId = b.VehicleID || b.vehicleid || `910${index + 1}`;
                    
                    // Default baseline sequence links
                    let leader = index === 0 ? "" : (arr[index - 1].VehicleID || `910${index}`);
                    let follower = index === arr.length - 1 ? "" : (arr[index + 1].VehicleID || `910${index + 2}`);

                    // INJECT MOCK MISMATCHES INTENTIONALLY (For demo and testing validation rules)
                    if (usingMockData) {
                        if (busId === "9102") {
                            // Break 9102's leader/follower pattern to test your rule
                            leader = "9101"; 
                            follower = "9101"; // Error! 9101 won't list 9102 as its follower on trip 2
                        }
                    }

                    return {
                        route: "ROUTE " + route + "-42 Eastbound",
                        busId: busId,
                        tripNumber: index + 1,
                        leaderBus: leader,
                        followerBus: follower
                    };
                });

                // Run Mismatch Logic Validation Checks
                busTrips.forEach((currentBus) => {
                    let isMismatch = false;
                    let failureReason = "Validated ✔";

                    // 1. Backward check: Ensure designated leader lists this bus as its follower
                    if (currentBus.leaderBus !== "") {
                        const targetLeader = busTrips.find(b => b.busId === currentBus.leaderBus);
                        if (targetLeader && targetLeader.followerBus !== currentBus.busId) {
                            isMismatch = true;
                            failureReason = `Leader ${currentBus.leaderBus} mismatch`;
                        } else if (!targetLeader) {
                            isMismatch = true;
                            failureReason = "Orphaned Leader Reference";
                        }
                    }

                    // 2. Forward check: Ensure designated follower lists this bus as its leader
                    if (currentBus.followerBus !== "" && !isMismatch) {
                        const targetFollower = busTrips.find(b => b.busId === currentBus.followerBus);
                        if (targetFollower && targetFollower.leaderBus !== currentBus.busId) {
                            isMismatch = true;
                            failureReason = `Follower ${currentBus.followerBus} mismatch`;
                        } else if (!targetFollower) {
                            isMismatch = true;
                            failureReason = "Orphaned Follower Reference";
                        }
                    }

                    // Render rows dynamically
                    const row = document.createElement('tr');
                    if (isMismatch) {
                        row.classList.add('mismatch-row');
                    }

                    row.innerHTML = `
                        <td>${currentBus.route}</td>
                        <td><strong>${currentBus.busId}</strong></td>
                        <td>${currentBus.tripNumber}</td>
                        <td>${currentBus.leaderBus || 'None'}</td>
                        <td>${currentBus.followerBus || 'None'}</td>
                        <td><span class="badge ${isMismatch ? 'badge-fail' : 'badge-pass'}">${failureReason}</span></td>
                    `;
                    tableBody.appendChild(row);
                });

                statusText.innerHTML = usingMockData 
                    ? `⚠️ API returned empty array. Displaying <strong>Simulated Live Sequence Mismatch Demo</strong>.`
                    : `🟢 Live Feed Loaded. Processed ${busTrips.length} active fleet sequences.`;

            } catch (error) {
                statusText.innerText = `Data parse failure: ${error.message}`;
                console.error(error);
            }
        }

        // Execute automatically on screen start
        fetchSeptaData();
    </script>
</body>
</html>
